    <!-- 此处编写博客正文 -->
    <p data-i18n="blog2_body_p1">进程调度是操作系统的核心模块，不同调度算法面向的负载场景差异较大。通用系统常用CFS完全公平调度，而AI专用系统会针对算力负载定制实时调度策略。</p>
    <p data-i18n="blog2_body_p2">内存管理负责虚拟地址与物理地址的映射，分页、分段机制保障进程隔离，也是容器、虚拟化技术的底层基础。</p>
    <p data-i18n="blog2_body_p3">硬件虚拟化借助CPU虚拟化指令集，实现多虚拟机并行运行，在云服务器、分布式集群中应用广泛。</p>

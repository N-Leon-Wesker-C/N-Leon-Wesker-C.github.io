<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="blog1_title">硬件解耦与大模型推理的思考</title>
<!-- 复制 index.htm 中完整的 <style> 样式代码 -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #ffffff;
    --bg-secondary: #f7f8fa;
    --bg-card: #ffffff;
    --border: #e2e6ea;
    --border-accent: #c8d6e5;
    --text-primary: #0d1117;
    --text-secondary: #4a5568;
    --text-muted: #8896a5;
    --accent: #0066cc;
    --accent-light: #e8f0fe;
    --accent-mid: #4a90d9;
    --gold: #b8860b;
    --code-bg: #f0f4f8;
  }
  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
    line-height: 1.6;
  }
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 64px;
    background: rgba(255,255,255,0.95);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(8px);
  }
  .nav-logo {
    font-family: 'Cinzel', serif;
    font-size: 14px; letter-spacing: 3px; color: var(--text-primary);
    text-transform: uppercase; font-weight: 700;
  }
  .nav-links { display: flex; gap: 24px; align-items: center; }
  .nav-links a {
    font-size: 13px; letter-spacing: 0.5px; color: var(--text-secondary);
    text-decoration: none; font-weight: 500;
    transition: color .2s;
  }
  .nav-links a:hover { color: var(--accent); }
  .lang-switch { display: flex; gap: 6px; margin-left: 10px; }
  .lang-btn {
    padding: 4px 8px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: #fff;
    cursor: pointer;
    border-radius: 3px;
  }
  .lang-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .section-wrap { padding: 80px 64px; max-width: 1100px; margin: 0 auto; }
  .section-header { margin-bottom: 48px; }
  .section-label {
    font-size: 10px; letter-spacing: 5px; color: var(--accent);
    text-transform: uppercase; margin-bottom: 10px;
    font-family: 'JetBrains Mono', monospace;
  }
  .section-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(22px, 3vw, 30px); font-weight: 700;
    color: var(--text-primary); letter-spacing: 1px;
  }
  .fade-in { opacity: 0; transform: translateY(16px); transition: opacity .5s, transform .5s; }
  .fade-in.visible { opacity: 1; transform: translateY(0); }
  footer {
    padding: 32px 64px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px; background: var(--bg);
  }
  .footer-logo {
    font-family: 'Cinzel', serif; font-size: 11px;
    letter-spacing: 3px; color: var(--text-muted); text-transform: uppercase;
  }
  .footer-copy { font-size: 12px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
  .article-content {
    font-size: 16px;
    line-height: 2;
    color: var(--text-secondary);
  }
  .article-content p {
    margin-bottom: 20px;
  }
  @media (max-width: 768px) {
    nav { padding: 14px 24px; }
    .nav-links { gap: 12px; }
    .section-wrap { padding: 60px 24px; }
    footer { padding: 24px; }
  }
</style>
</head>
<body>

<div id="header-placeholder"></div>

<section class="section-wrap fade-in" style="margin-top: 60px;">
  <div class="section-header">
    <p class="section-label" data-i18n="blog1_tag">系统 · 随笔</p>
    <h1 class="section-title" data-i18n="blog1_title">硬件解耦与大模型推理的思考</h1>
  </div>
  <div class="article-content">
    <!-- 此处编写博客正文，可自由扩充 -->
    <p>硬件解耦架构将计算、内存、存储资源拆分为独立的网络组件，彻底打破传统服务器硬件绑定的限制，非常适配大模型推理这类资源密集型负载。</p>
    <p>在大模型部署场景中，KV缓存会占用大量GPU显存，利用硬件解耦+RDMA跨节点传输，可以将缓存剥离至远端内存池，大幅降低单卡显存压力，同时提升集群资源利用率。</p>
    <p>相比于传统TCP通信，RDMA绕过操作系统内核，减少拷贝开销，有效降低跨节点数据传输延迟，是分布式LLM推理的核心优化方向之一。</p>
  </div>
</section>

<div id="footer-placeholder"></div>

<script src="lang.js"></script>
<script>
let currentLang = "zh";
function switchLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const k = el.getAttribute("data-i18n");
    el.innerHTML = translations[lang][k];
  });
  document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("active"));
  document.querySelector(`.lang-btn[onclick="switchLang('${lang}')"]`).classList.add("active");
  localStorage.setItem("lang", lang);
}

function initLanguage() {
  const saved = localStorage.getItem("lang") || "zh";
  switchLang(saved);
}

async function loadComponent(id, url) {
  const res = await fetch(url);
  const html = await res.text();
  document.getElementById(id).innerHTML = html;
}

Promise.all([
  loadComponent("header-placeholder", "components/header.html"),
  loadComponent("footer-placeholder", "components/footer.html")
]).then(() => {
  initLanguage();
});

const obs = new IntersectionObserver(es=>{es.forEach(e=>e.isIntersecting&&e.target.classList.add("visible"));},{threshold:0.08});
document.querySelectorAll(".fade-in").forEach(i=>obs.observe(i));
</script>
</body>
</html>

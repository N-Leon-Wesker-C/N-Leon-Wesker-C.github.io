<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000810; color: #e0f4ff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; min-height: 100vh; }
  :root { --blue-glow: #00bfff; --blue-mid: #0077aa; --blue-deep: #003355; --accent: #00e5ff; --text-main: #cce8f4; --text-muted: #5a8fa8; --gold: #c8a84b; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 18px 48px; background: linear-gradient(to bottom, rgba(0,8,16,0.95), transparent); border-bottom: 1px solid rgba(0,191,255,0.1); }
  .nav-logo { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; }
  .nav-links { display: flex; gap: 32px; }
  .nav-links a { font-size: 12px; letter-spacing: 3px; color: var(--text-muted); text-decoration: none; text-transform: uppercase; font-weight: 600; transition: color .2s; }
  .nav-links a:hover { color: var(--accent); }
  .hero { position: relative; min-height: 40vh; display: flex; align-items: center; justify-content: center; }
  .hero-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 60% 80% at 50% 40%, rgba(0,100,180,0.18) 0%, transparent 70%), #000810; }
  .hero-content { position: relative; z-index: 2; text-align: center; padding: 60px 24px; max-width: 900px; }
  .hero-title { font-family: 'Cinzel', serif; font-size: clamp(32px, 6vw, 56px); font-weight: 900; color: #fff; letter-spacing: -1px; text-shadow: 0 0 40px rgba(0,191,255,0.3); }
  .content { max-width: 800px; margin: 0 auto; padding: 40px 24px 100px; line-height: 1.8; font-size: 16px; color: var(--text-main); }
  .content h2 { margin: 30px 0 15px; color: var(--accent); }
  .fade-in { opacity: 0; transform: translateY(20px); transition: opacity .6s, transform .6s; }
  .fade-in.visible { opacity: 1; transform: translateY(0); }
  footer { padding: 40px 48px; border-top: 1px solid rgba(0,100,160,0.2); display: flex; justify-content: space-between; align-items: center; }
  .footer-logo { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 5px; color: var(--text-muted); }
  .footer-copy { font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Persona 3 Reload</div>
  <div class="nav-links">
    <a href="index.html#resume">履历</a>
    <a href="index.html#direction">研究方向</a>
    <a href="index.html#publication">出版物</a>
    <a href="index.html#character">文字</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content fade-in">
    <h1 class="hero-title">计算机基础架构</h1>
  </div>
</section>

<div class="content fade-in">
  <h2>研究内容</h2>
  <p>主要基于冯·诺依曼结构，由CPU（运算器、控制器）、存储器、输入设备和输出设备五大核心部件组成。</p>
  <h2>研究意义</h2>
  <p>构建所有计算系统的底层骨架，支撑操作系统、应用软件与上层服务稳定运行。</p>
</div>

<footer>
  <div class="footer-logo">Personal Academic</div>
  <div class="footer-copy">© 2025 All rights reserved.</div>
</footer>

<script>
  const obs = new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')})},{threshold:0.1});
  document.querySelectorAll('.fade-in').forEach(el=>obs.observe(el));
</script>
</body>
</html>
